server:
  port: ${PORT:8080}

spring:
  application:
    name: foodOrderingSystem
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/foodOrdering}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@food.com}
    password: ${APP_ADMIN_PASSWORD}
    name: ${APP_ADMIN_NAME:Admin}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
